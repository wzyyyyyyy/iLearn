name: package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: osx-x64
            os: macos-latest
          - rid: osx-arm64
            os: macos-latest
          - rid: linux-x64
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore iLearn.sln
      - run: dotnet test iLearn.sln --configuration Release --no-restore
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package/windows.ps1 -Rid ${{ matrix.rid }}
      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: ./scripts/package.sh ${{ matrix.rid }}
      - uses: actions/upload-artifact@v4
        with:
          name: iLearn-${{ matrix.rid }}-package
          path: artifacts/package/*
